<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波场SR监控系统</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:#f7f8fa;max-width:1100px;margin:24px auto;padding:0 16px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px;flex-wrap:wrap}
        h1{font-size:24px;color:#d32f2f;font-weight:700;display:flex;align-items:center;gap:8px}
        .header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .balance-badge{background:#fff;padding:8px 12px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08);font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;height:40px;min-width:120px;justify-content:center}
        .balance-badge .num{color:#d32f2f;font-size:15px}
        .balance-badge .icon{width:16px;height:16px;flex-shrink:0}
        .top-btn{display:flex;align-items:center;gap:6px;background:#fff;border:none;font-size:15px;padding:10px 14px;border-radius:12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:all 0.2s;height:40px}
        .top-btn:hover{background:#f9fafb;transform:translateY(-1px)}
        .top-icon{width:18px;height:18px}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:999;display:none;backdrop-filter:blur(4px)}
        .modal{background:#fff;border-radius:16px;width:90%;max-width:500px;padding:24px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
        .modal-close{position:absolute;top:16px;right:16px;border:none;background:#f5f5f5;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
        .modal-close:hover{background:#e5e7eb}
        .modal h3{font-size:18px;font-weight:600;margin-bottom:16px;color:#333}
        .card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);padding:20px;margin-bottom:20px}
        .card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #d32f2f;flex-wrap:wrap}
        .card-icon{width:26px;height:26px}
        .card h2{font-size:18px;font-weight:600;color:#333;border:none;padding:0;margin:0}
        .sync-tag{display:inline-block;padding:4px 10px;background:#E8FBF2;color:#00B42A;border-radius:8px;font-size:12px;font-weight:500}
        .monitor-tag{display:inline-block;padding:4px 10px;background:#fff7e6;color:#FF7D00;border-radius:8px;font-size:12px;font-weight:500}
        .odd-tag{display:inline-block;padding:2px 6px;background:#fef2f2;color:#d32f2f;border-radius:4px;font-size:11px;margin-left:4px}
        .even-tag{display:inline-block;padding:2px 6px;background:#eff6ff;color:#165DFF;border-radius:4px;font-size:11px;margin-left:4px}
        .sr-tag{display:inline-block;padding:3px 6px;background:#f0f9ff;color:#0369a1;border-radius:4px;font-size:11px;font-weight:600;text-align:center;min-width:40px;line-height:1.2}
        .bet-panel{background:#f9fafb;padding:14px;border-radius:10px;margin:10px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .bet-type{display:flex;gap:8px}
        .bet-type button{padding:8px 16px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer}
        .bet-type button.active{background:#d32f2f;color:#fff;border-color:#d32f2f}
        .bet-input{width:120px;padding:8px 10px;border-radius:8px;border:1px solid #e5e7eb}
        .bet-select,.sr-filter-select{padding:8px 10px;border-radius:8px;border:1px solid #e5e7eb;min-width:150px}
        .bet-btn{padding:8px 20px;background:#d32f2f;color:#fff;border:none;border-radius:8px;cursor:pointer}
        .bet-btn:disabled{background:#9ca3af;cursor:not-allowed}
        .bet-tip{font-size:12px;color:#666;margin-left:auto}
        .record-list{max-height:200px;overflow-y:auto;margin-top:10px;font-size:12px}
        .record-item{padding:6px 8px;border-bottom:1px solid #f2f2f2;display:flex;justify-content:space-between}
        .record-type{font-weight:500}
        .record-income{color:#00B42A}
        .record-cost{color:#d32f2f}
        .record-time{color:#999}
        .search-box{position:relative;margin-top:8px;margin-bottom:16px}
        .search-input{flex:1;padding:12px 14px;padding-right:30px;border:1px solid #e5e7eb;border-radius:10px;font-family:monospace;font-size:14px;outline:none;transition:all 0.2s;width:100%}
        .search-input:focus{border-color:#d32f2f;box-shadow:0 0 0 3px rgba(211,47,47,0.1)}
        .search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:#e5e7eb;color:#666;border:none;border-radius:50%;cursor:pointer;font-size:12px}
        .search-clear:hover{background:#d1d5db}
        .sr-filter-row{display:flex;align-items:center;gap:10px;margin:10px 0;flex-wrap:wrap}
        .sr-filter-row label{font-size:14px;font-weight:500;color:#333}
        .input-box,.wallet-input-box,.search-modal-input-box{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
        .input-box input,.wallet-input input,.search-modal-input input{flex:1;padding:12px 14px;border:1px solid #e5e7eb;border-radius:10px;font-family:monospace;font-size:14px;outline:none;transition:all 0.2s;min-width:200px}
        .input-box input:focus,.wallet-input input:focus,.search-modal-input input:focus{border-color:#d32f2f;box-shadow:0 0 0 3px rgba(211,47,47,0.1)}
        .btn{background:#d32f2f;color:#fff;border:none;padding:12px 20px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:500;transition:all 0.2s}
        .btn:hover{background:#b71c1c;transform:translateY(-1px)}
        .btn-gray{background:#6b7280;color:#fff}
        .btn-gray:hover{background:#4b5563}
        .load-more-btn{background:#f5f5f5;color:#333;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;font-size:14px;margin:12px auto 0;display:block;transition:all 0.2s}
        .load-more-btn:hover{background:#e5e7eb}
        .copy-btn{width:26px;height:26px;border-radius:6px;border:none;background:#eff6ff;color:#165DFF;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
        .copy-btn:hover{background:#dbeafe;color:#0f4c81;transform:scale(1.05)}
        .copy-btn.success{background:#dcfce7;color:#166534}
        .copy-icon{width:14px;height:14px}
        .block-info{line-height:2.4;font-size:15px;display:grid;grid-template-columns:120px auto;align-items:center;gap:8px}
        .block-info-detail{line-height:2.8;font-size:15px;display:grid;grid-template-columns:100px auto;align-items:flex-start;padding-top:10px}
        .label{font-weight:500;color:#555;width:100%}
        .value{color:#d32f2f;font-family:monospace;font-weight:500;word-break:break-all;display:flex;align-items:center;gap:6px}
        .value-detail{color:#333;font-family:monospace;font-weight:500;word-break:break-all;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .table-box{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;table-layout:fixed}
        .table-box th{background:#fafafa;color:#666;font-weight:600;padding:10px 6px;text-align:center;border-bottom:2px solid #f2f2f2;white-space:nowrap;vertical-align:middle;line-height:1.2}
        .table-box td{padding:8px 6px;text-align:center;border-bottom:1px solid #f2f2f2;word-break:break-all;vertical-align:middle;line-height:1.4}
        .sr-table th:nth-child(1){width:50px}
        .sr-table th:nth-child(2){width:90px}
        .sr-table th:nth-child(3){width:160px}
        .sr-table th:nth-child(4){width:70px}
        .sr-table th:nth-child(5){width:80px}
        .net-table th:nth-child(1){width:50px}
        .net-table th:nth-child(2){width:90px}
        .net-table th:nth-child(3){width:180px}
        .net-table th:nth-child(4){flex:1}
        .block-owner-time{display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:center}
        .owner-short{font-family:monospace;font-size:12px;color:#333;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
        .time-small{font-size:11px;color:#999}
        .table-box tr:hover{background:#fafafa}
        .hash-col{font-family:monospace;display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
        .height-col{display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
        .empty-tip{text-align:center;padding:32px;color:#999;font-size:14px}
        .search-result-tip{text-align:center;padding:20px;color:#666;font-size:14px}
        .search-loading{text-align:center;padding:20px;color:#666;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}
        .search-error{text-align:center;padding:20px;color:#d32f2f;font-size:14px}
        .tip{font-size:13px;color:#888;margin-top:12px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        @media(max-width:768px){
            .grid{grid-template-columns:1fr}
            .block-info-detail{grid-template-columns:80px auto}
            .table-container{overflow-x:auto;padding-bottom:4px}
            .sr-table th:nth-child(3),.net-table th:nth-child(3){width:130px}
        }
        .loading-tip{text-align:center;padding:20px;color:#666;font-size:14px}
        .balance-box{text-align:center;padding:20px;background:#f9fafb;border-radius:12px;margin-bottom:10px}
        .balance-label{font-size:14px;color:#666;margin-bottom:8px}
        .balance-amount{font-size:32px;font-weight:700;color:#d32f2f}
        .wallet-btn-group,.search-modal-btn-group{display:flex;gap:10px;margin-top:10px}
        .wallet-btn-group button,.search-modal-btn-group button{flex:1}
    </style>
</head>
<body>
<div class="header">
    <h1>
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#d32f2f"/>
            <path d="M2 17L12 22L22 17" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
            <path d="M2 12L12 17L22 12" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
        </svg>
        波场SR专属监控
    </h1>
    <div class="header-right">
        <div class="balance-badge" id="topBalance">
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 6.5H4C3.44772 6.5 3 6.94772 3 7.5V16.5C3 17.0523 3.44772 17.5 4 17.5H20C20.5523 17.5 21 17.0523 21 16.5V7.5C21 6.94772 20.5523 6.5 20 6.5Z" stroke="#d32f2f" stroke-width="2"/>
            </svg>
            余额：<span class="num">0.00</span>
        </div>
        <button class="top-btn" id="openWalletBtn">
            <svg class="top-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 18V6C21 4.89543 20.1046 4 19 4H5C3.89543 4 3 4.89543 3 6V18C3 19.1046 3.89543 20 5 20H19C20.1046 20 21 19.1046 21 18Z" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                <path d="M3 10H21" stroke="#333" stroke-width="2" stroke-linecap="round"/>
            </svg>
            💰钱包
        </button>
        <button class="top-btn" id="openSettingBtn">
            <svg class="top-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10.3246 3.31276C11.1246 2.90044 12.8754 2.90044 13.6754 3.31276L15.3246 4.18724C15.7246 4.3934 16.0671 4.73589 16.2733 5.13589L17.1478 6.78462C17.5591 7.58462 17.5591 9.33538 17.1478 10.1354L16.2733 11.7841C16.0671 12.1841 15.7246 12.5266 15.3246 12.7327L13.6754 13.6072C12.8754 14.0195 11.1246 14.0195 10.3246 13.6072L8.67538 12.7327C8.27538 12.5266 7.93289 12.1841 7.72673 11.7841L6.85218 10.1354C6.44086 9.33538 6.44086 7.58462 6.85218 6.78462L7.72673 5.13589C7.93289 4.73589 8.27538 4.3934 8.67538 4.18724L10.3246 3.31276Z" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5Z" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                <path d="M19 14V18C19 19.1046 18.1046 20 17 20H7C5.89543 20 5 19.1046 5 18V14" stroke="#333" stroke-width="2" stroke-linecap="round"/>
            </svg>
            ⚙️设置
        </button>
        <button class="top-btn" id="openSearchBtn">
            <svg class="top-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                <path d="M21 21L16.65 16.65" stroke="#333" stroke-width="2" stroke-linecap="round"/>
            </svg>
            🔍搜索
        </button>
    </div>
</div>

<!-- 钱包弹窗 -->
<div class="modal-overlay" id="walletModal">
    <div class="modal">
        <button class="modal-close" id="closeWalletModal">&times;</button>
        <h3>钱包管理</h3>
        <div class="balance-box">
            <div class="balance-label">可用余额</div>
            <div class="balance-amount" id="walletBalance">0.00</div>
        </div>
        <div class="wallet-input-box">
            <input type="number" id="rechargeInput" placeholder="输入充值金额" step="0.01">
            <button class="btn" id="rechargeBtn">充值</button>
        </div>
        <div class="wallet-input-box">
            <input type="number" id="withdrawInput" placeholder="输入提现金额" step="0.01">
            <button class="btn btn-gray" id="withdrawBtn">提现</button>
        </div>
        <h4 style="margin-top:16px;font-size:14px;">交易记录</h4>
        <div class="record-list" id="walletRecordList"></div>
        <div class="wallet-btn-group">
            <button class="btn" id="clearRecordBtn">清空记录</button>
            <button class="btn btn-gray" id="closeWalletModalBtn">关闭</button>
        </div>
    </div>
</div>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingModal">
    <div class="modal">
        <button class="modal-close" id="closeSettingModal">&times;</button>
        <h3>SR监控设置</h3>
        <div class="input-box">
            <input type="text" id="sr1Input" placeholder="SR1地址（T开头34位）" value="TQhuVjZtmp6k4fPmGZLr4wyXdziCVSPkEX">
        </div>
        <div class="input-box">
            <input type="text" id="sr2Input" placeholder="SR2地址（可选）">
        </div>
        <div class="input-box">
            <input type="text" id="sr3Input" placeholder="SR3地址（可选）">
        </div>
        <div class="input-box">
            <button class="btn" id="saveSettingBtn">保存并启动监控</button>
            <button class="btn btn-gray" id="closeSettingModalBtn">关闭</button>
        </div>
    </div>
</div>

<!-- 搜索弹窗 -->
<div class="modal-overlay" id="searchModal">
    <div class="modal">
        <button class="modal-close" id="closeSearchModal">&times;</button>
        <h3>区块搜索</h3>
        <div class="search-modal-input-box">
            <input type="text" id="searchInput" placeholder="输入区块高度/哈希">
            <button class="btn" id="doSearchBtn">搜索</button>
        </div>
        <div id="searchResult" class="search-result-tip">请输入区块高度/哈希进行搜索</div>
        <div class="search-modal-btn-group">
            <button class="btn btn-gray" id="closeSearchModalBtn">关闭</button>
        </div>
    </div>
</div>

<!-- 主内容 -->
<div class="grid">
    <div class="card">
        <div class="card-header">
            <svg class="card-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 8V16C21 17.1 20.1 18 19 18H5C3.9 18 3 17.1 3 16V8C3 6.9 3.9 6 5 6H19C20.1 6 21 6.9 21 8Z" stroke="#165DFF" stroke-width="2"/>
            </svg>
            <h2>最新全网区块</h2>
            <span class="sync-tag">稳定同步·不跳块</span>
        </div>
        <div class="block-info">
            <span class="label">区块高度：</span><span class="value" id="latestBlockHeight">-</span>
            <span class="label">区块哈希：</span><span class="value" id="latestBlockHash">-</span>
            <span class="label">出块者：</span><span class="value" id="latestBlockSr">-</span>
            <span class="label">出块时间：</span><span class="value" id="latestBlockTime">-</span>
        </div>
        <button class="btn" style="margin-top:16px;" id="refreshLatestBtn">立即刷新</button>
    </div>
    <div class="card">
        <div class="card-header">
            <svg class="card-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22C12 22 20 18 20 12V5C20 3.9 19.1 3 18 3H6C4.9 3 4 3.9 4 5V12C4 18 12 22 12 22Z" stroke="#FF7D00" stroke-width="2"/>
            </svg>
            <h2>目标SR出块记录</h2>
            <span class="monitor-tag">实时捕获</span>
        </div>
        <div class="bet-panel">
            <div class="bet-type">
                <button class="bet-btn active" data-bet="odd">单</button>
                <button class="bet-btn" data-bet="even">双</button>
            </div>
            <select class="bet-select" id="betSrSelect">
                <option value="">选择SR</option>
            </select>
            <input type="number" class="bet-input" id="betAmountInput" placeholder="下注金额" step="0.01">
            <button class="bet-btn" id="placeBetBtn">确认下注</button>
            <span class="bet-tip">赔率1:1，猜中即赢</span>
        </div>
        <div class="sr-filter-row">
            <label>查看记录：</label>
            <select class="sr-filter-select" id="srFilterSelect">
                <option value="all">全部SR记录</option>
            </select>
        </div>
        <div class="search-box">
            <input type="number" class="search-input" id="srSearchInput" placeholder="搜索区块高度...">
            <button class="search-clear" id="srSearchClear">&times;</button>
        </div>
        <div class="table-container">
            <div id="srRecordBox">
                <div class="empty-tip">等待监控启动...</div>
            </div>
        </div>
    </div>
</div>
<div class="card">
    <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 6H21" stroke="#666" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 12H21" stroke="#666" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 18H21" stroke="#666" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2>全网区块历史</h2>
    </div>
    <div class="search-box">
        <input type="number" class="search-input" id="netSearchInput" placeholder="搜索区块高度...">
        <button class="search-clear" id="netSearchClear">&times;</button>
    </div>
    <div class="table-container">
        <div id="netRecordBox">
            <div class="empty-tip">加载中...</div>
        </div>
    </div>
</div>

<script>
// ✅ 已经帮你填好你的Railway后端地址，直接用！
const API_BASE = 'https://tron-sr-server-final-production.up.railway.app';

// 全局状态
let walletBalance = 0;
let walletRecords = [];
let srList = [];
let currentBetSr = '';
let currentBetType = 'odd';
let latestBlock = null;
let srBlockRecords = [];
let netBlockRecords = [];
let netShowCount = 15;

// DOM元素
const walletModal = document.getElementById('walletModal');
const openWalletBtn = document.getElementById('openWalletBtn');
const closeWalletModal = document.getElementById('closeWalletModal');
const closeWalletModalBtn = document.getElementById('closeWalletModalBtn');
const walletBalanceEl = document.getElementById('walletBalance');
const topBalanceEl = document.querySelector('.balance-badge .num');
const rechargeInput = document.getElementById('rechargeInput');
const rechargeBtn = document.getElementById('rechargeBtn');
const withdrawInput = document.getElementById('withdrawInput');
const withdrawBtn = document.getElementById('withdrawBtn');
const walletRecordList = document.getElementById('walletRecordList');
const clearRecordBtn = document.getElementById('clearRecordBtn');

const settingModal = document.getElementById('settingModal');
const openSettingBtn = document.getElementById('openSettingBtn');
const closeSettingModal = document.getElementById('closeSettingModal');
const closeSettingModalBtn = document.getElementById('closeSettingModalBtn');
const sr1Input = document.getElementById('sr1Input');
const sr2Input = document.getElementById('sr2Input');
const sr3Input = document.getElementById('sr3Input');
const saveSettingBtn = document.getElementById('saveSettingBtn');

const searchModal = document.getElementById('searchModal');
const openSearchBtn = document.getElementById('openSearchBtn');
const closeSearchModal = document.getElementById('closeSearchModal');
const closeSearchModalBtn = document.getElementById('closeSearchModalBtn');
const searchInput = document.getElementById('searchInput');
const doSearchBtn = document.getElementById('doSearchBtn');
const searchResult = document.getElementById('searchResult');

const latestBlockHeightEl = document.getElementById('latestBlockHeight');
const latestBlockHashEl = document.getElementById('latestBlockHash');
const latestBlockSrEl = document.getElementById('latestBlockSr');
const latestBlockTimeEl = document.getElementById('latestBlockTime');
const refreshLatestBtn = document.getElementById('refreshLatestBtn');

const betSrSelect = document.getElementById('betSrSelect');
const betAmountInput = document.getElementById('betAmountInput');
const placeBetBtn = document.getElementById('placeBetBtn');
const betTypeBtns = document.querySelectorAll('.bet-type button');

const srFilterSelect = document.getElementById('srFilterSelect');
const srSearchInput = document.getElementById('srSearchInput');
const srSearchClear = document.getElementById('srSearchClear');
const srRecordBox = document.getElementById('srRecordBox');

const netSearchInput = document.getElementById('netSearchInput');
const netSearchClear = document.getElementById('netSearchClear');
const netRecordBox = document.getElementById('netRecordBox');

// 工具函数
function formatTime(timestamp) {
  const d = new Date(timestamp);
  return d.toLocaleString('zh-CN', { hour12: false });
}

function shortenAddr(addr) {
  if (!addr || addr.length <= 14) return addr;
  return addr.slice(0, 6) + '...' + addr.slice(-6);
}

async function copyText(text, fullText = '') {
  const copyContent = fullText || text;
  try {
    await navigator.clipboard.writeText(copyContent);
    return true;
  } catch (err) {
    alert('复制失败，请手动复制：' + copyContent);
    return false;
  }
}

function createCopyBtn(text, fullText = '') {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = `<svg class="copy-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3C7.44772 3 7 3.44772 7 4V16C7 16.5523 7.44772 17 8 17H16C16.5523 17 17 16.5523 17 16V4C17 3.44772 16.5523 3 16 3H8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M3 7C3 6.44772 3.44772 6 4 6H16C16.5523 6 17 6.44772 17 7V19C17 19.5523 16.5523 20 16 20H4C3.44772 20 3 19.5523 3 19V7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
  btn.onclick = async (e) => {
    e.stopPropagation();
    const success = await copyText(text, fullText);
    if (success) {
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 1500);
    }
  };
  return btn;
}

// 钱包功能
function updateWalletUI() {
  walletBalanceEl.textContent = walletBalance.toFixed(2);
  topBalanceEl.textContent = walletBalance.toFixed(2);
  renderWalletRecords();
}

function renderWalletRecords() {
  if (walletRecords.length === 0) {
    walletRecordList.innerHTML = '<div class="empty-tip">暂无交易记录</div>';
    return;
  }
  const html = walletRecords.map(r => `
    <div class="record-item">
      <div>
        <span class="record-type">${r.type === 'recharge' ? '充值' : r.type === 'withdraw' ? '提现' : r.type === 'win' ? '下注赢' : '下注输'}</span>
        <span class="record-time">${r.time}</span>
      </div>
      <span class="${r.amount > 0 ? 'record-income' : 'record-cost'}">${r.amount > 0 ? '+' : ''}${r.amount.toFixed(2)}</span>
    </div>
  `).join('');
  walletRecordList.innerHTML = html;
}

openWalletBtn.onclick = () => walletModal.style.display = 'flex';
closeWalletModal.onclick = () => walletModal.style.display = 'none';
closeWalletModalBtn.onclick = () => walletModal.style.display = 'none';
walletModal.onclick = (e) => e.target === walletModal && (walletModal.style.display = 'none');

rechargeBtn.onclick = () => {
  const amount = parseFloat(rechargeInput.value);
  if (isNaN(amount) || amount <= 0) {
    alert('请输入正确的充值金额');
    return;
  }
  walletBalance += amount;
  walletRecords.unshift({ type: 'recharge', amount, time: new Date().toLocaleString('zh-CN') });
  updateWalletUI();
  rechargeInput.value = '';
  alert('充值成功！');
};

withdrawBtn.onclick = () => {
  const amount = parseFloat(withdrawInput.value);
  if (isNaN(amount) || amount <= 0) {
    alert('请输入正确的提现金额');
    return;
  }
  if (amount > walletBalance) {
    alert('余额不足');
    return;
  }
  walletBalance -= amount;
  walletRecords.unshift({ type: 'withdraw', amount: -amount, time: new Date().toLocaleString('zh-CN') });
  updateWalletUI();
  withdrawInput.value = '';
  alert('提现成功！');
};

clearRecordBtn.onclick = () => {
  if (confirm('确定清空所有交易记录？')) {
    walletRecords = [];
    renderWalletRecords();
  }
};

// 设置功能
openSettingBtn.onclick = () => settingModal.style.display = 'flex';
closeSettingModal.onclick = () => settingModal.style.display = 'none';
closeSettingModalBtn.onclick = () => settingModal.style.display = 'none';
settingModal.onclick = (e) => e.target === settingModal && (settingModal.style.display = 'none');

saveSettingBtn.onclick = async () => {
  const sr1 = sr1Input.value.trim();
  const sr2 = sr2Input.value.trim();
  const sr3 = sr3Input.value.trim();
  const list = [sr1, sr2, sr3].filter(Boolean);
  if (list.length === 0) {
    alert('请至少输入一个SR地址');
    return;
  }
  srList = list;
  updateSrSelect();
  settingModal.style.display = 'none';
  await loadLatestBlock();
  alert('监控已启动！');
};

function updateSrSelect() {
  betSrSelect.innerHTML = '<option value="">选择SR</option>';
  srFilterSelect.innerHTML = '<option value="all">全部SR记录</option>';
  srList.forEach((sr, idx) => {
    const opt1 = document.createElement('option');
    opt1.value = sr;
    opt1.textContent = `SR${idx+1} (${shortenAddr(sr)})`;
    betSrSelect.appendChild(opt1);
    const opt2 = document.createElement('option');
    opt2.value = sr;
    opt2.textContent = `SR${idx+1}`;
    srFilterSelect.appendChild(opt2);
  });
}

// 区块数据获取
async function fetchLatestBlock() {
  const res = await fetch(`${API_BASE}/api/block/latest`);
  if (!res.ok) throw new Error('获取最新区块失败');
  return await res.json();
}

async function loadLatestBlock() {
  try {
    const block = await fetchLatestBlock();
    latestBlock = block;
    latestBlockHeightEl.textContent = block.block_header.raw_data.number;
    latestBlockHashEl.textContent = block.blockID;
    const srAddr = block.block_header.raw_data.witness_address;
    const shortSr = shortenAddr(srAddr);
    const isMySr = srList.includes(srAddr);
    latestBlockSrEl.innerHTML = `${shortSr} ${isMySr ? '<span class="sr-tag">我的SR</span>' : ''}`;
    latestBlockSrEl.appendChild(createCopyBtn(shortSr, srAddr));
    latestBlockTimeEl.textContent = formatTime(block.block_header.raw_data.timestamp * 1000);
    await loadNetBlocks(block.block_header.raw_data.number);
    if (isMySr) {
      addSrBlockRecord(block);
    }
    checkBetResult(block);
  } catch (err) {
    console.error(err);
    alert('获取最新区块失败，请检查网络');
  }
}

async function loadNetBlocks(latestNum) {
  const records = [];
  for (let i = 0; i < netShowCount; i++) {
    const num = latestNum - i;
    if (num < 0) break;
    try {
      const res = await fetch(`${API_BASE}/api/block/${num}`);
      const block = await res.json();
      records.push(block);
    } catch (err) {
      console.error('获取区块失败', num, err);
    }
  }
  netBlockRecords = records;
  renderNetRecords();
}

function renderNetRecords() {
  if (netBlockRecords.length === 0) {
    netRecordBox.innerHTML = '<div class="empty-tip">暂无数据</div>';
    return;
  }
  const table = document.createElement('table');
  table.className = 'table-box net-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th>序号</th>
        <th>高度</th>
        <th>区块哈希</th>
        <th>出块者 / 时间</th>
      </tr>
    </thead>
    <tbody>
      ${netBlockRecords.map((block, idx) => {
        const num = block.block_header.raw_data.number;
        const hash = block.blockID;
        const srAddr = block.block_header.raw_data.witness_address;
        const shortSr = shortenAddr(srAddr);
        const time = formatTime(block.block_header.raw_data.timestamp * 1000);
        const isMySr = srList.includes(srAddr);
        return `
          <tr>
            <td>${idx+1}</td>
            <td><span class="height-col">${num}${createCopyBtn(num)}</span></td>
            <td><span class="hash-col">${hash.slice(0,8)}...${hash.slice(-8)}${createCopyBtn(hash.slice(0,8)+'...'+hash.slice(-8), hash)}</span></td>
            <td>
              <div class="block-owner-time">
                <div class="owner-short">
                  ${shortSr}
                  ${isMySr?'<span class="sr-tag">SR</span>':''}
                  ${createCopyBtn(shortSr, srAddr)}
                </div>
                <div class="time-small">${time}</div>
              </div>
            </td>
          </tr>
        `;
      }).join('')}
    </tbody>
  `;
  netRecordBox.innerHTML = '';
  netRecordBox.appendChild(table);
  const loadMore = document.createElement('button');
  loadMore.className = 'load-more-btn';
  loadMore.textContent = '加载更多';
  loadMore.onclick = async () => {
    netShowCount += 15;
    await loadNetBlocks(latestBlock.block_header.raw_data.number);
  };
  netRecordBox.appendChild(loadMore);
}

function addSrBlockRecord(block) {
  const exist = srBlockRecords.find(r => r.blockID === block.blockID);
  if (exist) return;
  srBlockRecords.unshift(block);
  if (srBlockRecords.length > 50) srBlockRecords.pop();
  renderSrRecords();
}

function renderSrRecords(filterSr = 'all', searchNum = '') {
  let list = srBlockRecords;
  if (filterSr !== 'all') {
    list = list.filter(r => r.block_header.raw_data.witness_address === filterSr);
  }
  if (searchNum) {
    const num = parseInt(searchNum);
    list = list.filter(r => r.block_header.raw_data.number === num);
  }
  if (list.length === 0) {
    srRecordBox.innerHTML = '<div class="empty-tip">暂无SR出块记录</div>';
    return;
  }
  const table = document.createElement('table');
  table.className = 'table-box sr-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th>序号</th>
        <th>高度</th>
        <th>区块哈希</th>
        <th>单双</th>
        <th>时间</th>
      </tr>
    </thead>
    <tbody>
      ${list.map((block, idx) => {
        const num = block.block_header.raw_data.number;
        const hash = block.blockID;
        const isOdd = num % 2 === 1;
        const time = formatTime(block.block_header.raw_data.timestamp * 1000);
        return `
          <tr>
            <td>${idx+1}</td>
            <td><span class="height-col">${num}${createCopyBtn(num)}</span></td>
            <td><span class="hash-col">${hash.slice(0,8)}...${hash.slice(-8)}${createCopyBtn(hash.slice(0,8)+'...'+hash.slice(-8), hash)}</span></td>
            <td>${isOdd ? '<span class="odd-tag">单</span>' : '<span class="even-tag">双</span>'}</td>
            <td>${time}</td>
          </tr>
        `;
      }).join('')}
    </tbody>
  `;
  srRecordBox.innerHTML = '';
  srRecordBox.appendChild(table);
}

// 下注功能
betTypeBtns.forEach(btn => {
  btn.onclick = () => {
    betTypeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentBetType = btn.dataset.bet;
  };
});

placeBetBtn.onclick = () => {
  const sr = betSrSelect.value;
  const amount = parseFloat(betAmountInput.value);
  if (!sr) {
    alert('请选择SR');
    return;
  }
  if (isNaN(amount) || amount <= 0) {
    alert('请输入正确的下注金额');
    return;
  }
  if (amount > walletBalance) {
    alert('余额不足');
    return;
  }
  currentBetSr = sr;
  walletBalance -= amount;
  walletRecords.unshift({ type: 'bet', amount: -amount, time: new Date().toLocaleString('zh-CN') });
  updateWalletUI();
  betAmountInput.value = '';
  alert(`已下注 ${amount} TRX，SR: ${shortenAddr(sr)}，类型: ${currentBetType === 'odd' ? '单' : '双'}`);
};

function checkBetResult(block) {
  if (!currentBetSr) return;
  const blockSr = block.block_header.raw_data.witness_address;
  if (blockSr !== currentBetSr) return;
  const num = block.block_header.raw_data.number;
  const isBlockOdd = num % 2 === 1;
  const isBetWin = (currentBetType === 'odd' && isBlockOdd) || (currentBetType === 'even' && !isBlockOdd);
  const betRecord = walletRecords.find(r => r.type === 'bet' && r.amount < 0);
  if (!betRecord) return;
  const betAmount = Math.abs(betRecord.amount);
  if (isBetWin) {
    walletBalance += betAmount * 2;
    walletRecords.unshift({ type: 'win', amount: betAmount, time: new Date().toLocaleString('zh-CN') });
    alert(`恭喜！下注赢了，获得 ${betAmount} TRX`);
  } else {
    walletRecords.unshift({ type: 'lose', amount: -betAmount, time: new Date().toLocaleString('zh-CN') });
    alert(`很遗憾，下注输了，损失 ${betAmount} TRX`);
  }
  currentBetSr = '';
  updateWalletUI();
}

// 搜索功能
openSearchBtn.onclick = () => {
  searchModal.style.display = 'flex';
  searchInput.value = '';
  searchResult.innerHTML = '请输入区块高度/哈希进行搜索';
};
closeSearchModal.onclick = () => searchModal.style.display = 'none';
closeSearchModalBtn.onclick = () => searchModal.style.display = 'none';
searchModal.onclick = (e) => e.target === searchModal && (searchModal.style.display = 'none');

doSearchBtn.onclick = async () => {
  const keyword = searchInput.value.trim();
  if (!keyword) {
    alert('请输入区块高度/哈希');
    return;
  }
  searchResult.innerHTML = '<div class="search-loading">搜索中...</div>';
  try {
    const res = await fetch(`${API_BASE}/api/block/${keyword}`);
    const block = await res.json();
    const num = block.block_header.raw_data.number;
    const hash = block.blockID;
    const srAddr = block.block_header.raw_data.witness_address;
    const shortSr = shortenAddr(srAddr);
    const time = formatTime(block.block_header.raw_data.timestamp * 1000);
    const isMySr = srList.includes(srAddr);
    const isOdd = num % 2 === 1;
    searchResult.innerHTML = `
      <div class="block-info-detail">
        <span class="label">区块高度：</span><span class="value-detail">${num}${createCopyBtn(num)}</span>
        <span class="label">区块哈希：</span><span class="value-detail">${hash}${createCopyBtn(hash)}</span>
        <span class="label">出块者：</span><span class="value-detail">${shortSr}${isMySr?'<span class="sr-tag">我的SR</span>':''}${createCopyBtn(shortSr, srAddr)}</span>
        <span class="label">单双：</span><span class="value-detail">${isOdd?'<span class="odd-tag">单</span>':'<span class="even-tag">双</span>'}</span>
        <span class="label">出块时间：</span><span class="value-detail">${time}</span>
      </div>
    `;
  } catch (err) {
    searchResult.innerHTML = '<div class="search-error">搜索失败，请检查输入的高度/哈希是否正确</div>';
  }
};

// 搜索过滤
srFilterSelect.onchange = () => {
  renderSrRecords(srFilterSelect.value, srSearchInput.value);
};
srSearchInput.oninput = () => {
  renderSrRecords(srFilterSelect.value, srSearchInput.value);
};
srSearchClear.onclick = () => {
  srSearchInput.value = '';
  renderSrRecords(srFilterSelect.value, '');
};

netSearchInput.oninput = () => {
  const num = netSearchInput.value;
  if (!num) {
    renderNetRecords();
    return;
  }
  const block = netBlockRecords.find(r => r.block_header.raw_data.number === parseInt(num));
  if (!block) {
    netRecordBox.innerHTML = '<div class="empty-tip">未找到对应区块</div>';
    return;
  }
  netRecordBox.innerHTML = `
    <div class="table-container">
      <table class="table-box net-table">
        <thead>
          <tr>
            <th>高度</th>
            <th>区块哈希</th>
            <th>出块者 / 时间</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="height-col">${block.block_header.raw_data.number}${createCopyBtn(block.block_header.raw_data.number)}</span></td>
            <td><span class="hash-col">${block.blockID}${createCopyBtn(block.blockID)}</span></td>
            <td>
              <div class="block-owner-time">
                <div class="owner-short">
                  ${shortenAddr(block.block_header.raw_data.witness_address)}
                  ${srList.includes(block.block_header.raw_data.witness_address)?'<span class="sr-tag">SR</span>':''}
                  ${createCopyBtn(shortenAddr(block.block_header.raw_data.witness_address), block.block_header.raw_data.witness_address)}
                </div>
                <div class="time-small">${formatTime(block.block_header.raw_data.timestamp * 1000)}</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  `;
};
netSearchClear.onclick = () => {
  netSearchInput.value = '';
  renderNetRecords();
};

// 刷新按钮
refreshLatestBtn.onclick = loadLatestBlock;

// 初始化
async function init() {
  await loadLatestBlock();
  setInterval(loadLatestBlock, 3000);
}

init();
</script>
